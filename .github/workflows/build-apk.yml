name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev git zip unzip openjdk-17-jdk autoconf libtool libffi-dev libssl-dev

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Setup Android SDK & Accept Licenses
        run: |
          # Install Android command-line tools
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR
          cd $SDK_DIR
          # Download cmdline-tools
          curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo cmdline-tools.zip
          # Accept all licenses
          yes | ./cmdline-tools/bin/sdkmanager --sdk_root=$SDK_DIR --licenses 2>&1 || true
          # Install required SDK components
          yes | ./cmdline-tools/bin/sdkmanager --sdk_root=$SDK_DIR "platform-tools" "platforms;android-34" "build-tools;37.0.0" 2>&1 || true
          echo "SDK setup done"
          ls -la $SDK_DIR/platforms/ 2>/dev/null
          ls -la $SDK_DIR/build-tools/ 2>/dev/null

      - name: Build APK
        working-directory: ssq_predictor
        run: |
          echo "=== buildozer.spec check ==="
          grep -E "title|version|requirements|android.arch|p4a.release" buildozer.spec || true
          echo "=== Keystore check ==="
          ls -la ssq-release.keystore || echo "KEYSTORE MISSING!"
          echo "=== Buildozer build ==="
          buildozer android release 2>&1
          echo "=== Build exit: $? ==="
          ls -la bin/ 2>/dev/null || echo "bin/ empty"
          find . -name "*.apk" 2>/dev/null || echo "No APK"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SSQ-Predictor-Build-Output
          path: |
            ssq_predictor/bin/*.apk
            ssq_predictor/.buildozer/android/platform/*.log
          retention-days: 30
