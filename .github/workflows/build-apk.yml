name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev git zip unzip openjdk-17-jdk autoconf libtool libffi-dev libssl-dev

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Accept Android SDK licenses
        run: |
          # Pre-create license files so sdkmanager doesn't prompt
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR/licenses
          # Standard SDK license hashes - these are the accepted license fingerprints
          cat > $SDK_DIR/licenses/android-sdk-license << 'LICEOF'
          8933bad161af4178b1185d1a37fbf41ea5269c55
          d56f5187479451eabf01fb78af6dfcb131a6481e
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          LICEOF
          cat > $SDK_DIR/licenses/android-sdk-preview-license << 'LICEOF'
          84831b9409646a918e30573bab4c9c91346d8abd
          LICEOF
          echo "License files created"
          ls -la $SDK_DIR/licenses/

      - name: Build APK
        working-directory: ssq_predictor
        run: |
          echo "=== Keystore check ==="
          ls -la ssq-release.keystore || echo "KEYSTORE MISSING!"
          echo "=== Buildozer build (attempt 1) ==="
          buildozer android release 2>&1 || {
            echo "=== Accepting licenses via sdkmanager ==="
            SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
            # After buildozer downloads tools, find and use sdkmanager
            for sdk in "$SDK_DIR/tools/bin/sdkmanager" "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager"; do
              if [ -f "$sdk" ]; then
                echo "Found sdkmanager at $sdk"
                yes | "$sdk" --sdk_root="$SDK_DIR" --licenses 2>&1 || true
                break
              fi
            done
            echo "=== Buildozer build (retry) ==="
            buildozer android release 2>&1
          }
          echo "=== Build exit: $? ==="
          ls -la bin/ 2>/dev/null || echo "bin/ empty"
          find . -name "*.apk" 2>/dev/null || echo "No APK"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SSQ-Predictor-Build-Output
          path: |
            ssq_predictor/bin/*.apk
            ssq_predictor/.buildozer/android/platform/*.log
          retention-days: 30
