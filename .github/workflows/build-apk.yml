name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev git zip unzip openjdk-17-jdk autoconf libtool libffi-dev libssl-dev

      - name: Install buildozer
        run: |
          pip install buildozer cython
          # Patch buildozer bug: meta.split('=', 1) crashes on malformed metadata
          python -c "
          import buildozer.targets.android as m
          src = open(m.__file__).read()
          old = \"key, value = meta.split('=', 1)\"
          new = \"if '=' not in meta: continue; key, value = meta.split('=', 1)\"
          if old in src:
              open(m.__file__, 'w').write(src.replace(old, new))
              print('PATCHED buildozer android.py')
          else:
              print('Patch target not found, checking for alternative pattern...')
              # Try with different spacing
              for pat in ['meta.split(\"=\", 1)', \"meta.split('=', 1)\"]:
                  if pat in src:
                      print(f'Found: {pat}')
          "

      - name: Setup Android SDK (manual)
        run: |
          # Use Java 17 (required by sdkmanager)
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          echo "JAVA_HOME=$JAVA_HOME"
          java -version 2>&1

          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR

          # Download cmdline-tools
          echo "Downloading cmdline-tools..."
          curl -sL -o /tmp/cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo /tmp/cmdline.zip -d $SDK_DIR/cmdline-tools
          mv $SDK_DIR/cmdline-tools/cmdline-tools $SDK_DIR/cmdline-tools/latest 2>/dev/null || true

          # Create symlink for buildozer compatibility
          mkdir -p $SDK_DIR/tools/bin
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager

          # Accept licenses and install SDK packages
          echo "Accepting licenses + installing SDK..."
          yes | $SDK_DIR/tools/bin/sdkmanager --sdk_root=$SDK_DIR --licenses 2>&1 | tail -3
          yes | $SDK_DIR/tools/bin/sdkmanager --sdk_root=$SDK_DIR "platform-tools" "platforms;android-34" "build-tools;37.0.0" 2>&1 | tail -10

          echo "=== SDK setup done ==="
          ls -la $SDK_DIR/platforms/ $SDK_DIR/build-tools/ $SDK_DIR/licenses/

      - name: Generate JKS Keystore
        working-directory: ssq_predictor
        run: |
          # Generate proper JKS keystore (PKCS12 not compatible with jarsigner)
          keytool -genkey -v \
            -keystore ssq-release.jks \
            -alias ssqkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ssq2026predictor \
            -keypass ssq2026predictor \
            -dname "CN=SSQ Predictor, OU=Dev, O=SSQ, L=Beijing, ST=Beijing, C=CN" \
            -noprompt
          echo "JKS keystore created"
          ls -la ssq-release.jks

      - name: Build APK
        working-directory: ssq_predictor
        run: |
          # Ensure data file is in the app directory for APK bundling
          cp ../ssq_全历史.json ./ssq_全历史.json 2>/dev/null || true
          echo "Data file: $(ls -la ssq_全历史.json 2>/dev/null || echo 'NOT FOUND')"
          # Download Chinese font — place in fonts/ dir for resource_add_path
          echo "Downloading CJK font..."
          mkdir -p fonts
          for url in \
            "https://raw.githubusercontent.com/aosp-mirror/platform_frameworks_base/master/data/fonts/DroidSansFallback.ttf" \
            "https://github.com/aosp-mirror/platform_frameworks_base/raw/master/data/fonts/DroidSansFallback.ttf"; do
            curl -sL -o fonts/DroidSansFallback.ttf "$url" 2>&1 && break
          done
          # Also copy to root as fallback
          cp fonts/DroidSansFallback.ttf ./DroidSansFallback.ttf 2>/dev/null || true
          ls -la fonts/DroidSansFallback.ttf 2>/dev/null && echo "Font OK" || echo "Font download failed"
          echo "=== Buildozer debug build ==="
          buildozer android debug 2>&1
          echo "=== Build exit: $? ==="
          ls -laR bin/ 2>/dev/null || echo "bin/ empty"

      - name: Sign APK
        if: always()
        working-directory: ssq_predictor
        run: |
          DEBUG_APK=$(find bin -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$DEBUG_APK" ]; then
            SDK=$HOME/.buildozer/android/platform/android-sdk
            APKSIGNER=$(find $SDK/build-tools -name apksigner -type f 2>/dev/null | sort -r | head -1)
            echo "Signing $DEBUG_APK with $APKSIGNER"
            $APKSIGNER sign --ks ssq-release.jks \
              --ks-pass pass:ssq2026predictor \
              --ks-key-alias ssqkey \
              --key-pass pass:ssq2026predictor \
              --out bin/SSQPredictor-release.apk \
              "$DEBUG_APK"
            echo "Signed:"
            ls -la bin/SSQPredictor-release.apk
          else
            echo "No APK found"
          fi

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SSQ-Predictor-APK
          path: ssq_predictor/bin/SSQPredictor-release.apk
          retention-days: 30
