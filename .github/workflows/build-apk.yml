name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev git zip unzip openjdk-17-jdk autoconf libtool libffi-dev libssl-dev

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Build APK
        working-directory: ssq_predictor
        run: |
          echo "=== buildozer.spec check ==="
          grep -E "title|version|requirements|android.arch|p4a.release" buildozer.spec || true
          echo "=== Keystore check ==="
          ls -la ssq-release.keystore || echo "KEYSTORE MISSING!"
          echo "=== Data file check ==="
          ls -la ../ssq_全历史.json || echo "DATA FILE MISSING!"
          echo "=== Buildozer build ==="
          # Run buildozer; if it fails due to license, accept and retry
          buildozer android release 2>&1 || {
            echo "=== First build attempt failed, accepting SDK licenses ==="
            SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
            # Try to find sdkmanager
            SDKMANAGER=$(find $SDK_DIR -name sdkmanager -type f 2>/dev/null | head -1)
            if [ -n "$SDKMANAGER" ]; then
              yes | $SDKMANAGER --licenses --sdk_root=$SDK_DIR 2>&1 || true
            fi
            # Also create license file as fallback
            mkdir -p $SDK_DIR/licenses
            echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK_DIR/licenses/android-sdk-license
            echo "Retrying build..."
            buildozer android release 2>&1
          }
          echo "=== Build exit code: $? ==="
          echo "=== Bin directory ==="
          ls -la bin/ 2>/dev/null || echo "bin/ not found"
          find . -name "*.apk" 2>/dev/null || echo "No APK found anywhere"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SSQ-Predictor-Build-Output
          path: |
            ssq_predictor/bin/*.apk
            ssq_predictor/.buildozer/android/platform/*.log
          retention-days: 30
